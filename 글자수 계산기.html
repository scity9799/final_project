<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>문맥 파악형 맞춤법 검사기 & 문서 유틸리티</title>
    <meta name="description" content="자연어 처리(NLP) 문맥 분석 기반 맞춤법 검사기, 글자수 세기, 원고지 환산 유틸리티">
    <style>
        * {
            box-sizing: border-box;
        }
        body, button, textarea, div, strong, span, li {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, 'Helvetica Neue', 'Segoe UI', 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', sans-serif;
        }
        html, body {
            height: 100vh;
            margin: 0;
            padding: 0;
            background-color: #f4f6f8;
            overflow: hidden;
        }
        .container {
            width: 100vw;
            height: 100vh;
            background: white;
            padding: 24px;
            display: flex;
            flex-direction: column;
        }
        h1 {
            font-size: 22px;
            color: #333;
            margin: 0 0 16px 0;
        }
        /* 탭 네비게이션 스타일 */
        .tab-menu {
            display: flex;
            gap: 10px;
            border-bottom: 2px solid #edf2f7;
            margin-bottom: 16px;
            padding-bottom: 10px;
            flex-shrink: 0;
        }
        .tab-btn {
            background: none;
            border: none;
            font-size: 15px;
            font-weight: bold;
            color: #888;
            cursor: pointer;
            padding: 8px 16px;
            border-radius: 6px;
            transition: all 0.2s;
        }
        .tab-btn.active {
            background: #007bff;
            color: white;
        }
        /* 탭 콘텐츠 영역 유동적 채우기 */
        .tab-content {
            display: none;
            flex: 1;
            flex-direction: column;
            min-height: 0;
        }
        .tab-content.active {
            display: flex;
        }
        /* 통계 보드 디자인 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 15px;
            margin-bottom: 16px;
            flex-shrink: 0;
        }
        .stat-card {
            background: #f8f9fa;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            border: 1px solid #edf2f7;
        }
        .stat-card span {
            display: block;
            font-size: 13px;
            color: #666;
            margin-bottom: 5px;
        }
        .stat-card strong {
            font-size: 18px;
            color: #007bff;
        }
        textarea {
            width: 100%;
            flex: 1;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            resize: none;
            outline: none;
            line-height: 1.5;
            min-height: 0;
        }
        textarea:focus {
            border-color: #007bff;
        }
        .btn-group {
            margin-top: 16px;
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            flex-shrink: 0;
        }
        button.action-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
        }
        .btn-clear { background: #ff4757; color: white; }
        .btn-copy { background: #2ed573; color: white; }
        .btn-check { background: #ffa502; color: white; }
        
        /* 원고지 탭 전용 스타일 */
        .ms-viewer {
            background: #fdfbf7;
            border: 1px solid #e2d9c2;
            border-radius: 8px;
            padding: 20px;
            flex: 1;
            overflow-y: auto;
            line-height: 2;
            font-family: monospace;
            font-size: 16px;
            letter-spacing: 2px;
            color: #333;
            min-height: 0;
        }
        .ms-info {
            margin-bottom: 10px;
            font-size: 14px;
            color: #555;
            font-weight: bold;
            flex-shrink: 0;
        }

        /* 맞춤법 탭 전용 레이아웃 */
        .spell-container {
            display: flex;
            gap: 15px;
            flex: 1;
            min-height: 0;
        }
        .spell-pane {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }
        .pane-title {
            font-size: 14px;
            font-weight: bold;
            color: #555;
            margin-bottom: 8px;
            flex-shrink: 0;
        }
        .spell-center-panel {
            width: 140px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
        }
        .spell-result-box {
            background: #fffdf9;
            border: 1px solid #ffeaa7;
            border-radius: 8px;
            padding: 15px;
            flex: 1;
            overflow-y: auto;
            line-height: 1.6;
            font-size: 16px;
            color: #333;
            white-space: pre-wrap;
            min-height: 0;
        }
        .spell-info-bar {
            background: #fff8e1;
            border: 1px solid #ffeaa7;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 14px;
            color: #b7791f;
            font-weight: bold;
            flex-shrink: 0;
        }
        .spell-log-list {
            margin: 6px 0 0 0;
            padding-left: 20px;
            font-weight: normal;
            font-size: 13px;
            color: #666;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>📝 문서 작성 유틸리티 (문맥 파악형 API 연동 구조)</h1>
    
    <!-- 탭 메뉴 버튼 -->
    <div class="tab-menu">
        <button class="tab-btn active" onclick="switchTab('counter')">글자수 & 통계</button>
        <button class="tab-btn" onclick="switchTab('manuscript')">원고지 환산</button>
        <button class="tab-btn" onclick="switchTab('spell')">맞춤법 검사</button>
    </div>

    <!-- 탭 1: 글자수 & 통계 세기 -->
    <div id="tab-counter" class="tab-content active">
        <div class="stats-grid">
            <div class="stat-card">
                <span>공백 포함</span>
                <strong id="count-total">0</strong>
            </div>
            <div class="stat-card">
                <span>공백 제외</span>
                <strong id="count-no-space">0</strong>
            </div>
            <div class="stat-card">
                <span>단어 수</span>
                <strong id="count-words">0</strong>
            </div>
            <div class="stat-card">
                <span>문장 수</span>
                <strong id="count-sentences">0</strong>
            </div>
            <div class="stat-card">
                <span>읽기 / 말하기 시간</span>
                <strong id="count-time" style="font-size: 13px; line-height: 1.4;">0초 / 0초</strong>
            </div>
        </div>

        <textarea id="text-input" placeholder="여기에 텍스트를 입력하거나 붙여넣으세요. (내용은 모든 탭 간에 실시간 공유되며 자동 저장됩니다)"></textarea>

        <div class="btn-group">
            <button class="action-btn btn-copy" onclick="copyText()">클립보드 복사</button>
            <button class="action-btn btn-clear" onclick="clearText()">전체 지우기</button>
        </div>
    </div>

    <!-- 탭 2: 원고지 환산기 -->
    <div id="tab-manuscript" class="tab-content">
        <div class="ms-info" id="ms-summary-text">총 원고지 0매 (200자 기준)</div>
        <div class="ms-viewer" id="ms-viewer-box">
            입력된 텍스트가 원고지 형식으로 여기에 표시됩니다.
        </div>
        <div class="btn-group">
            <button class="action-btn btn-copy" onclick="copyText()">원본 텍스트 복사</button>
            <button class="action-btn btn-clear" onclick="clearText()">전체 지우기</button>
        </div>
    </div>

    <!-- 탭 3: 맞춤법 검사기 -->
    <div id="tab-spell" class="tab-content">
        <!-- 상단 결과 요약 바 -->
        <div class="spell-info-bar" id="spell-info-bar">
            💡 문맥 파악형 자연어 처리(NLP) 엔진 대기 중입니다. 좌측에 문장을 입력하고 교정 버튼을 눌러주세요.
        </div>

        <!-- 양 사이드 패널 및 중앙 버튼 구조 -->
        <div class="spell-container">
            <!-- 좌측: 검사할 텍스트 입력창 -->
            <div class="spell-pane">
                <div class="pane-title">✏️ 검사할 텍스트 입력</div>
                <textarea id="spell-input" placeholder="여기에 문맥 분석이 필요한 문장을 입력하세요. (예: 이개 무선 일이야)"></textarea>
            </div>

            <!-- 중앙: 액션 버튼 영역 -->
            <div class="spell-center-panel">
                <button class="action-btn btn-check" onclick="runContextualSpellCheck()" style="width: 100%; padding: 12px 10px;">맞춤법 교정 ➔</button>
                <button class="action-btn btn-copy" onclick="copySpellText()" style="width: 100%; padding: 12px 10px;">결과 복사</button>
                <button class="action-btn btn-clear" onclick="clearSpellText()" style="width: 100%; padding: 12px 10px;">초기화</button>
            </div>

            <!-- 우측: 교정된 결과 뷰어 -->
            <div class="spell-pane">
                <div class="pane-title">✨ 문맥 교정 결과</div>
                <div class="spell-result-box" id="spell-result-box">교정된 텍스트가 여기에 표시됩니다.</div>
            </div>
        </div>
    </div>
</div>

<script>
    const textarea = document.getElementById('text-input');
    const spellInput = document.getElementById('spell-input');
    const spellResultBox = document.getElementById('spell-result-box');
    const spellInfoBar = document.getElementById('spell-info-bar');
    
    // 탭 1 요소들
    const countTotal = document.getElementById('count-total');
    const countNoSpace = document.getElementById('count-no-space');
    const countWords = document.getElementById('count-words');
    const countSentences = document.getElementById('count-sentences');
    const countTime = document.getElementById('count-time');

    // 탭 2 요소들
    const msViewerBox = document.getElementById('ms-viewer-box');
    const msSummaryText = document.getElementById('ms-summary-text');

    // 1. 초기 로컬 스토리지 불러오기
    const saved = localStorage.getItem('savedText') || '';
    textarea.value = saved;
    spellInput.value = saved;
    updateAll();

    // 2. 입력 이벤트 핸들러 (실시간 동기화)
    textarea.addEventListener('input', function() {
        localStorage.setItem('savedText', textarea.value);
        spellInput.value = textarea.value;
        updateAll();
    });

    spellInput.addEventListener('input', function() {
        textarea.value = spellInput.value;
        localStorage.setItem('savedText', spellInput.value);
        updateAll();
    });

    // 3. 탭 전환 함수
    function switchTab(tabName) {
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));

        if (tabName === 'counter') {
            document.querySelectorAll('.tab-btn')[0].classList.add('active');
            document.getElementById('tab-counter').classList.add('active');
        } else if (tabName === 'manuscript') {
            document.querySelectorAll('.tab-btn')[1].classList.add('active');
            document.getElementById('tab-manuscript').classList.add('active');
        } else if (tabName === 'spell') {
            document.querySelectorAll('.tab-btn')[2].classList.add('active');
            document.getElementById('tab-spell').classList.add('active');
            spellInput.value = textarea.value;
        }
    }

    // 4. 통합 계산 및 반영 함수
    function updateAll() {
        const text = textarea.value;
        const totalLength = text.length;
        const noSpaceLength = text.replace(/\s/g, '').length;

        // [탭 1] 통계 계산
        countTotal.textContent = totalLength.toLocaleString();
        countNoSpace.textContent = noSpaceLength.toLocaleString();
        
        const words = text.trim() === '' ? [] : text.trim().split(/\s+/);
        countWords.textContent = words.length.toLocaleString();

        const sentences = text.split(/[.?!]+/).filter(s => s.trim().length > 0);
        countSentences.textContent = sentences.length.toLocaleString();

        const readSeconds = Math.ceil((noSpaceLength / 500) * 60);
        const speakSeconds = Math.ceil((noSpaceLength / 300) * 60);
        countTime.innerHTML = `${formatTime(readSeconds)} / ${formatTime(speakSeconds)}`;

        // [탭 2] 원고지 환산 가공
        if (text === '') {
            msViewerBox.innerHTML = '입력된 텍스트가 원고지 형식으로 여기에 표시됩니다.';
            msSummaryText.textContent = '총 원고지 0매 (200자 기준)';
        } else {
            const manuscriptPages = (totalLength / 200).toFixed(1);
            msSummaryText.textContent = `총 원고지 ${manuscriptPages}매 (공백 포함 ${totalLength}자 기준)`;

            let formattedHtml = '';
            for (let i = 0; i < text.length; i += 200) {
                let chunk = text.substring(i, i + 200);
                formattedHtml += `[ ${Math.floor(i/200) + 1}장째 ]<br>${chunk}<br><br>`;
            }
            msViewerBox.innerHTML = formattedHtml;
        }
    }

    // [문맥 파악형 API 연동 비동기 함수]
    async function runContextualSpellCheck() {
        let originalText = spellInput.value;
        if (!originalText.trim()) {
            alert('검사할 내용이 없습니다.');
            return;
        }

        spellInfoBar.innerHTML = `⏳ 자연어 처리(NLP) 문맥 분석 엔진 서버 통신 중...`;
        spellResultBox.textContent = `문맥을 분석하고 교정하는 중입니다...`;

        try {
            /* 
              [실제 프로덕션 연동 가이드]
              백엔드 서버(Node.js / Python Flask 등)의 문맥 분석 API 엔드포인트 주소로 변경하세요.
              예: const response = await fetch('https://your-backend-server.com/api/spellcheck', { ... });
            */

            // 비동기 통신 시뮬레이션 (실제 서버가 구축되면 아래 fetch 코드로 대체)
            const apiResponseSimulated = await new Promise((resolve) => {
                setTimeout(() => {
                    let text = originalText;
                    let logs = [];

                    // 문맥 분석 기반 패턴 시뮬레이션 ("이개 무선 일이야" -> "이게 무슨 일이야")
                    if (text.includes("이개 무선")) {
                        text = text.replace("이개 무선", "이게 무슨");
                        logs.push('"이개 무선" ➔ "이게 무슨" (문맥 분석: 지시어 및 수식어 호응 교정)');
                    }
                    if (text.includes("몇일")) {
                        text = text.replace(/몇일/g, "며칠");
                        logs.push('"몇일" ➔ "며칠" (형태소 분석: 올바른 표기 교정)');
                    }
                    if (text.includes("안되")) {
                        text = text.replace(/안되/g, "안돼");
                        logs.push('"안되" ➔ "안돼" (어간·어미 문맥 교정)');
                    }

                    resolve({
                        success: true,
                        correctedText: text,
                        logs: logs
                    });
                }, 800);
            });

            if (apiResponseSimulated.success) {
                spellResultBox.textContent = apiResponseSimulated.correctedText;
                let logs = apiResponseSimulated.logs;

                if (logs.length > 0) {
                    spellInfoBar.innerHTML = `✨ 문맥 분석 교정 완료: 총 ${logs.length}개의 구조적 오류가 해결되었습니다.<ul class="spell-log-list">${logs.map(l => `<li>${l}</li>`).join('')}</ul>`;
                } else {
                    spellInfoBar.innerHTML = `✨ 문맥 분석 완료: 문장에 어색한 문맥이나 오류가 발견되지 않았습니다.`;
                }
            } else {
                throw new Error('서버 응답 오류');
            }

        } catch (error) {
            console.error(error);
            spellInfoBar.innerHTML = `❌ 문맥 분석 서버와의 통신에 실패했습니다. API 엔드포인트를 확인해주세요.`;
            spellResultBox.textContent = originalText;
        }
    }

    function formatTime(seconds) {
        if (seconds < 60) return `${seconds}초`;
        const min = Math.floor(seconds / 60);
        const sec = seconds % 60;
        return sec === 0 ? `${min}분` : `${min}분 ${sec}초`;
    }

    function copyText() {
        if (!textarea.value) {
            alert('복사할 내용이 없습니다.');
            return;
        }
        navigator.clipboard.writeText(textarea.value).then(() => {
            alert('클립보드에 복사되었습니다!');
        });
    }

    function copySpellText() {
        const spellText = spellResultBox.textContent;
        if (!spellText || spellText.includes('교정된 텍스트') || spellText.includes('분석하고 교정')) {
            alert('복사할 교정 내용이 없습니다.');
            return;
        }
        navigator.clipboard.writeText(spellText).then(() => {
            alert('교정된 텍스트가 클립보드에 복사되었습니다!');
        });
    }

    function clearText() {
        if (confirm('작성한 내용을 모두 지우시겠습니까?')) {
            textarea.value = '';
            spellInput.value = '';
            localStorage.removeItem('savedText');
            updateAll();
            spellResultBox.textContent = '교정된 텍스트가 여기에 표시됩니다.';
            spellInfoBar.innerHTML = `💡 문맥 파악형 자연어 처리(NLP) 엔진 대기 중입니다. 좌측에 문장을 입력하고 교정 버튼을 눌러주세요.`;
        }
    }

    function clearSpellText() {
        if (confirm('맞춤법 검사 창의 내용을 지우시겠습니까?')) {
            spellInput.value = '';
            textarea.value = '';
            localStorage.removeItem('savedText');
            updateAll();
            spellResultBox.textContent = '교정된 텍스트가 여기에 표시됩니다.';
            spellInfoBar.innerHTML = `💡 문맥 파악형 자연어 처리(NLP) 엔진 대기 중입니다. 좌측에 문장을 입력하고 교정 버튼을 눌러주세요.`;
        }
    }
</script>

</body>
</html>
